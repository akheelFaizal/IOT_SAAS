name: Academic_Project_Report_Writer_Antigravity_v1
trigger: "create documentation"
type: documentation_generator

activation:
  mode: strict_contains
  phrase: "create documentation"

behavior:
  output: PROJECT_REPORT.md
  format: markdown
  verbosity: high
  academic_level: masters

rules:
  - no_partial_output: true
  - no_followup_questions: true
  - infer_missing_data: true
  - minimum_chapter_words: 700

chapters:
  - Executive Summary
  - Abstract
  - Introduction
  - Literature Survey
  - System Overview
  - System Architecture
  - System Design
  - Algorithms and Internal Logic
  - Implementation
  - Testing and Validation
  - Results and Future Scope
  - References
